name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: todoist-focus-widget

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: todoist-focus-widget/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: todoist-focus-widget/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app (Universal Binary)
        run: npm run tauri build -- --target universal-apple-darwin

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: todoist-focus-widget-dmg
          path: todoist-focus-widget/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          retention-days: 90

  release:
    needs: build-macos
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download dmg artifact
        uses: actions/download-artifact@v4
        with:
          name: todoist-focus-widget-dmg
          path: dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dmg/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
